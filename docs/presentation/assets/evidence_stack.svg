<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="560" viewBox="0 0 1050 560" role="img" aria-labelledby="title desc">
  <title id="title">Orin NX Evidence Stack</title>
  <desc id="desc">Layered evidence stack from harness checks to portfolio wording.</desc>
  <defs>
    <style>
      .title { font: 700 22px Arial, sans-serif; fill: #1f2933; }
      .layer { font: 700 15px Arial, sans-serif; fill: #1f2933; }
      .body { font: 12px Arial, sans-serif; fill: #354250; }
      .small { font: 11px Arial, sans-serif; fill: #52606d; }
      .box { stroke: #9fb3c8; stroke-width: 1.3; rx: 8; }
      .l0 { fill: #eef2f7; }
      .l1 { fill: #e8f4ff; }
      .l2 { fill: #eef8f0; }
      .l3 { fill: #fff7e6; }
      .l4 { fill: #f3edff; }
      .l5 { fill: #fcebea; }
    </style>
  </defs>

  <rect width="1050" height="560" fill="#ffffff"/>
  <text x="40" y="44" class="title">Evidence Stack For Interview And Reproduction</text>
  <text x="40" y="68" class="small">Each layer has a different claim. Do not merge module, stage, and product claims.</text>

  <rect x="70" y="95" width="910" height="58" class="box l0"/>
  <text x="95" y="120" class="layer">L0 - Harness Control</text>
  <text x="330" y="120" class="body">onboard / doctor / claim gate</text>
  <text x="330" y="140" class="small">Proves project routing and guardrails, not performance.</text>

  <rect x="70" y="170" width="910" height="58" class="box l1"/>
  <text x="95" y="195" class="layer">L1 - Regular Quality</text>
  <text x="330" y="195" class="body">Regular gate + resid_r15_s07</text>
  <text x="330" y="215" class="small">In-domain EIS quality, not all-scene product quality.</text>

  <rect x="70" y="245" width="910" height="58" class="box l2"/>
  <text x="95" y="270" class="layer">L2 - VPI Module</text>
  <text x="330" y="270" class="body">PerspectiveWarp latency and 4K FPS/W</text>
  <text x="330" y="290" class="small">Module-level acceleration, not full pipeline speedup.</text>

  <rect x="70" y="320" width="910" height="58" class="box l3"/>
  <text x="95" y="345" class="layer">L3 - Device Dataflow</text>
  <text x="330" y="345" class="body">MMAPI/NVDEC -> VPI -> NVENC</text>
  <text x="330" y="365" class="small">Device-stage path and memory-format boundary.</text>

  <rect x="70" y="395" width="910" height="58" class="box l4"/>
  <text x="95" y="420" class="layer">L4 - Profiling And Lifecycle</text>
  <text x="330" y="420" class="body">Nsight/NVTX, NvBuffer pair, stream-only reuse</text>
  <text x="330" y="440" class="small">Wrapper/sync/transform/lifecycle attribution and small stage gains.</text>

  <rect x="70" y="470" width="910" height="58" class="box l5"/>
  <text x="95" y="495" class="layer">L5 - Portfolio</text>
  <text x="330" y="495" class="body">README, reproducibility guide, evidence reader path, Q&A, resume bullets</text>
  <text x="330" y="515" class="small">Turns measured evidence into public, interview-safe wording.</text>
</svg>
